daily_start_date: "2023-01-01"
incremental_days: 7
batch_size: 100
# 调度默认意图（可被 Settings 覆盖）
jobs:
  sync_trade_calendar: { cron: "0 2 * * *" }
  sync_security_list: { cron: "0 15 * * 1-5" }
  ingest_daily_incremental: { cron: "30 15 * * 1-5" }
  backfill_daily_chunks: { cron: "0 1 * * *" }
  ingest_minute_watch: { minutes: 3, session_only: true }
  sync_sentiment_daily: { cron: "35 15 * * 1-5" }
  sync_lhb_daily: { cron: "0 18 * * 1-5" }
  # 晨会：开盘前综述 + 竞价快照/选拔（北京时间）
  run_morning_preopen: { cron: "20 8 * * 1-5" }
  ingest_auction_snapshots: { cron: "26 9 * * 1-5" }
  run_morning_post_auction: { cron: "28 9 * * 1-5" }
  purge_with_minute: true
