services:
  postgres_stock:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: desk
      POSTGRES_PASSWORD: desk
      POSTGRES_DB: desk
    ports:
      - '5432:5432'
    volumes:
      - desk_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U desk -d desk']
      interval: 5s
      timeout: 5s
      retries: 10

  mysql_stock:
    profiles: ['mysql']
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: desk
      MYSQL_PASSWORD: desk
      MYSQL_DATABASE: desk
    ports:
      - '3306:3306'
    volumes:
      - desk_mysql:/var/lib/mysql

volumes:
  desk_pg:
  desk_mysql:
